<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quem Disse o Quê — Dicionário de Frases e Citações</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg2: #1a1915;
    --bg3: #242220;
    --border: #3a3830;
    --border2: #4a4640;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --text: #e8e4d8;
    --text2: #a09a8c;
    --text3: #6a6458;
    --red: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
  }

  /* ── LOADING ── */
  #loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000; transition: opacity .5s;
  }
  #loading-screen.fade { opacity: 0; pointer-events: none; }
  .loader-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; color: var(--gold);
    letter-spacing: .04em; margin-bottom: 2rem;
  }
  .loader-bar-wrap {
    width: 240px; height: 2px;
    background: var(--bg3); border-radius: 2px; overflow: hidden;
  }
  .loader-bar {
    height: 100%; width: 0%; background: var(--gold);
    transition: width .3s ease;
  }
  .loader-status {
    margin-top: 1rem; font-size: .8rem;
    color: var(--text3); letter-spacing: .05em;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    background: linear-gradient(180deg, #1a1810 0%, var(--bg) 100%);
  }
  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    color: var(--gold2);
    letter-spacing: .02em;
    line-height: 1.1;
  }
  .site-title span { color: var(--text2); font-weight: 400; font-style: italic; font-size: .65em; }
  .site-subtitle {
    margin-top: .6rem;
    font-size: .85rem;
    color: var(--text3);
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .site-count {
    margin-top: .4rem;
    font-size: .8rem;
    color: var(--text3);
  }
  .site-count strong { color: var(--gold); }

  /* ── SEARCH PANEL ── */
  .search-panel {
    max-width: 900px; margin: 2rem auto;
    padding: 0 1.5rem;
  }

  .search-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .75rem;
    margin-bottom: .75rem;
  }
  @media (max-width: 600px) {
    .search-row { grid-template-columns: 1fr; }
  }

  .input-group { position: relative; }
  .input-group label {
    display: block;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text3);
    margin-bottom: .35rem;
  }
  .input-group input, .input-group select {
    width: 100%; padding: .7rem 1rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: .9rem;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  .input-group input:focus, .input-group select:focus {
    border-color: var(--gold);
  }
  .input-group input::placeholder { color: var(--text3); }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute; right: .9rem; top: 50%;
    transform: translateY(-50%);
    color: var(--text3); pointer-events: none;
    font-size: .75rem;
  }

  /* Searchable tema dropdown */
  .tema-wrap { position: relative; }
  .tema-input-container { position: relative; }
  .tema-input-container input {
    padding-right: 2rem;
    cursor: pointer;
  }
  .tema-dropdown {
    display: none;
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    max-height: 240px; overflow-y: auto;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }
  .tema-dropdown.open { display: block; }
  .tema-dropdown-search {
    padding: .5rem .75rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg2);
  }
  .tema-dropdown-search input {
    width: 100%; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 3px;
    color: var(--text); font-size: .85rem;
    padding: .4rem .6rem; outline: none;
  }
  .tema-option {
    padding: .5rem .75rem;
    cursor: pointer; font-size: .85rem;
    color: var(--text2);
    transition: background .15s, color .15s;
  }
  .tema-option:hover, .tema-option.highlighted {
    background: var(--bg3); color: var(--gold);
  }
  .tema-option.selected { color: var(--gold2); }
  .tema-option.clear-opt { color: var(--text3); font-style: italic; }

  .filters-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: .75rem;
    margin-bottom: 1rem;
  }
  @media (max-width: 600px) {
    .filters-row { grid-template-columns: 1fr 1fr; }
  }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    border-radius: 4px; padding: .5rem 1rem;
    cursor: pointer; font-size: .8rem;
    letter-spacing: .06em;
    transition: border-color .2s, color .2s;
    font-family: 'Lora', serif;
  }
  .btn-clear:hover { border-color: var(--gold); color: var(--gold); }

  /* ── RESULTS BAR ── */
  .results-bar {
    max-width: 900px; margin: 0 auto 1rem;
    padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: .5rem;
  }
  .results-count {
    font-size: .8rem;
    color: var(--text3);
    letter-spacing: .04em;
  }
  .results-count strong { color: var(--gold); }
  .results-info {
    font-size: .75rem; color: var(--text3);
  }

  /* ── CARDS ── */
  .cards-container {
    max-width: 900px; margin: 0 auto;
    padding: 0 1.5rem 3rem;
    display: flex; flex-direction: column; gap: .75rem;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.4rem 1.6rem;
    transition: border-color .2s;
    animation: fadeUp .25s ease both;
  }
  .card:hover { border-color: var(--border2); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-frase {
    font-family: 'EB Garamond', 'Playfair Display', serif;
    font-size: 1.1rem;
    line-height: 1.65;
    color: var(--text);
    font-style: italic;
    margin-bottom: .8rem;
  }
  .card-frase em { font-style: normal; color: var(--gold2); background: rgba(201,168,76,.1); border-radius: 2px; padding: 0 1px; }

  .card-autor {
    font-size: .8rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: .05em;
    text-transform: uppercase;
    margin-bottom: .75rem;
  }
  .card-autor span { color: var(--text3); font-weight: 400; }

  .card-tags {
    display: flex; flex-wrap: wrap; gap: .35rem;
  }
  .tag {
    font-size: .68rem;
    padding: .2rem .55rem;
    border-radius: 20px;
    letter-spacing: .04em;
    border: 1px solid;
  }
  .tag-tema { border-color: #4a4228; color: #c9a84c; background: rgba(201,168,76,.07); }
  .tag-tom  { border-color: #2a3a4a; color: #6ab0d8; background: rgba(106,176,216,.07); }
  .tag-sent { border-color: #2a3d2a; color: #7abf7a; background: rgba(122,191,122,.07); }
  .tag-dom  { border-color: #3a2a3a; color: #b07ab0; background: rgba(176,122,176,.07); }

  /* ── HIGHLIGHT ── */
  mark {
    background: rgba(201,168,76,.25);
    color: var(--gold2);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── PAGINATION ── */
  .pagination {
    max-width: 900px; margin: 1.5rem auto 3rem;
    padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: center;
    gap: .4rem; flex-wrap: wrap;
  }
  .pag-btn {
    min-width: 36px; height: 36px;
    padding: 0 .5rem;
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 4px;
    cursor: pointer; font-size: .85rem;
    font-family: 'Lora', serif;
    transition: all .15s;
  }
  .pag-btn:hover { border-color: var(--gold); color: var(--gold); }
  .pag-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 700; }
  .pag-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 4rem 2rem;
    color: var(--text3);
  }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: .4; }
  .empty-state p { font-size: .9rem; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    text-align: center; padding: 1.5rem;
    font-size: .75rem; color: var(--text3);
    letter-spacing: .06em;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loader-title">Quem Disse o Quê</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-status" id="loader-status">Carregando acervo...</div>
</div>

<!-- HEADER -->
<header>
  <div class="site-title">Quem Disse o Quê <span>— Dicionário de Frases e Citações</span></div>
  <div class="site-subtitle">Curadoria de Rafael Villas Bôas</div>
  <div class="site-count" id="site-count">Carregando...</div>
</header>

<!-- SEARCH PANEL -->
<div class="search-panel">
  <div class="search-row">
    <div class="input-group">
      <label>Buscar por palavra</label>
      <input type="text" id="search-text" placeholder="Mínimo 3 letras, palavra completa..." autocomplete="off">
    </div>
    <div class="input-group">
      <label>Buscar por autor</label>
      <input type="text" id="search-autor" placeholder="Nome do autor..." autocomplete="off">
    </div>
  </div>

  <div class="filters-row">
    <!-- TEMA PRINCIPAL - searchable -->
    <div class="input-group">
      <label>Tema Principal</label>
      <div class="tema-wrap">
        <div class="tema-input-container">
          <input type="text" id="tema-display" placeholder="Todos os temas" readonly autocomplete="off">
        </div>
        <div class="tema-dropdown" id="tema-dropdown">
          <div class="tema-dropdown-search">
            <input type="text" id="tema-filter-input" placeholder="Filtrar tema..." autocomplete="off">
          </div>
          <div id="tema-options-list"></div>
        </div>
      </div>
    </div>

    <!-- TOM -->
    <div class="input-group">
      <label>Tom</label>
      <div class="select-wrap">
        <select id="filter-tom">
          <option value="">Todos os tons</option>
        </select>
      </div>
    </div>

    <!-- SENTIMENTO -->
    <div class="input-group">
      <label>Sentimento</label>
      <div class="select-wrap">
        <select id="filter-sentimento">
          <option value="">Todos os sentimentos</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn-clear" id="btn-clear">✕ Limpar filtros</button>
</div>

<!-- RESULTS BAR -->
<div class="results-bar">
  <div class="results-count" id="results-count"></div>
  <div class="results-info" id="results-info"></div>
</div>

<!-- CARDS -->
<div class="cards-container" id="cards-container"></div>

<!-- PAGINATION -->
<div class="pagination" id="pagination"></div>

<footer>
  Quem Disse o Quê &nbsp;·&nbsp; <span id="footer-year"></span> &nbsp;·&nbsp; quemdisseoque.com.br
</footer>

<script>
const PER_PAGE = 20;
let allData = [];
let filtered = [];
let currentPage = 1;
let selectedTema = '';

// ── LOAD DATA ──
async function loadData() {
  const bar = document.getElementById('loader-bar');
  const status = document.getElementById('loader-status');
  try {
    status.textContent = 'Baixando acervo (16 MB)...';
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('Arquivo não encontrado');
    const total = parseInt(res.headers.get('content-length') || '0');
    const reader = res.body.getReader();
    let chunks = [], received = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      if (total) bar.style.width = Math.min(90, (received / total * 90)) + '%';
    }
    status.textContent = 'Processando frases...';
    bar.style.width = '95%';
    const blob = new Blob(chunks);
    const text = await blob.text();
    bar.style.width = '98%';
    allData = JSON.parse(text);
    bar.style.width = '100%';
    status.textContent = allData.length.toLocaleString('pt-BR') + ' frases carregadas.';
    await new Promise(r => setTimeout(r, 500));
    document.getElementById('loading-screen').classList.add('fade');
    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 600);
    init();
  } catch(e) {
    status.textContent = 'Erro ao carregar: ' + e.message;
    bar.style.background = '#c0392b';
  }
}

function init() {
  document.getElementById('site-count').innerHTML =
    '<strong>' + allData.length.toLocaleString('pt-BR') + '</strong> frases e citações';
  document.getElementById('footer-year').textContent = new Date().getFullYear();
  buildFilters();
  filtered = allData;
  renderPage();
  setupEvents();
}

// ── BUILD FILTER DROPDOWNS ──
function buildFilters() {
  const tons = [...new Set(allData.map(d=>d.tm).filter(Boolean))].sort();
  const sents = [...new Set(allData.map(d=>d.s).filter(Boolean))].sort();
  const temas = [...new Set(allData.map(d=>d.tp).filter(Boolean))].sort();

  const tomSel = document.getElementById('filter-tom');
  tons.forEach(t => { const o = new Option(t,t); tomSel.add(o); });

  const sentSel = document.getElementById('filter-sentimento');
  sents.forEach(s => { const o = new Option(s,s); sentSel.add(o); });

  buildTemaDropdown(temas);
}

function buildTemaDropdown(temas) {
  const list = document.getElementById('tema-options-list');
  // Clear option
  const clearDiv = document.createElement('div');
  clearDiv.className = 'tema-option clear-opt';
  clearDiv.textContent = '— Todos os temas —';
  clearDiv.dataset.value = '';
  list.appendChild(clearDiv);
  // Options
  temas.forEach(t => {
    const div = document.createElement('div');
    div.className = 'tema-option';
    div.textContent = t;
    div.dataset.value = t;
    list.appendChild(div);
  });
  updateTemaOptions('');
}

function updateTemaOptions(filterText) {
  const items = document.querySelectorAll('#tema-options-list .tema-option');
  const q = filterText.toLowerCase().trim();
  items.forEach(item => {
    if (item.classList.contains('clear-opt')) { item.style.display = ''; return; }
    item.style.display = (!q || item.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

// ── SEARCH & FILTER ──
function applyFilters() {
  const textQ = document.getElementById('search-text').value.trim();
  const autorQ = document.getElementById('search-autor').value.trim().toLowerCase();
  const tomQ = document.getElementById('filter-tom').value;
  const sentQ = document.getElementById('filter-sentimento').value;

  const textValid = textQ.length >= 3;
  let textRegex = null;
  if (textValid) {
    try { textRegex = new RegExp('\\b' + escapeRegex(textQ) + '\\b', 'gi'); }
    catch(e) { textRegex = null; }
  }

  filtered = allData.filter(row => {
    if (textValid && textRegex) {
      textRegex.lastIndex = 0;
      if (!textRegex.test(row.f)) return false;
    }
    if (autorQ && !row.a.toLowerCase().includes(autorQ)) return false;
    if (selectedTema && row.tp !== selectedTema) return false;
    if (tomQ && row.tm !== tomQ) return false;
    if (sentQ && row.s !== sentQ) return false;
    return true;
  });

  currentPage = 1;
  renderPage();
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ── RENDER ──
function renderPage() {
  const total = filtered.length;
  const totalPages = Math.ceil(total / PER_PAGE);
  const start = (currentPage - 1) * PER_PAGE;
  const end = Math.min(start + PER_PAGE, total);
  const page = filtered.slice(start, end);

  document.getElementById('results-count').innerHTML =
    total === 0 ? 'Nenhuma frase encontrada'
    : '<strong>' + total.toLocaleString('pt-BR') + '</strong> frase' + (total !== 1 ? 's' : '') + ' encontrada' + (total !== 1 ? 's' : '');

  document.getElementById('results-info').textContent =
    total > 0 ? ('Mostrando ' + (start+1) + '–' + end + ' de ' + total.toLocaleString('pt-BR')) : '';

  const container = document.getElementById('cards-container');
  container.innerHTML = '';

  if (total === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>Nenhuma frase corresponde aos critérios.<br>Tente outros termos ou remova filtros.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const textQ = document.getElementById('search-text').value.trim();
  const textValid = textQ.length >= 3;
  let highlightRx = null;
  if (textValid) {
    try { highlightRx = new RegExp('\\b(' + escapeRegex(textQ) + ')\\b', 'gi'); } catch(e) {}
  }
  const autorQ = document.getElementById('search-autor').value.trim();
  let autorRx = null;
  if (autorQ.length >= 1) {
    try { autorRx = new RegExp('(' + escapeRegex(autorQ) + ')', 'gi'); } catch(e) {}
  }

  page.forEach((row, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.02) + 's';

    let fraseHtml = escapeHtml(row.f);
    if (highlightRx) { highlightRx.lastIndex = 0; fraseHtml = fraseHtml.replace(highlightRx, '<mark>$1</mark>'); }

    let autorHtml = row.a ? escapeHtml(row.a) : '<span>Autor desconhecido</span>';
    if (autorRx && row.a) { autorRx.lastIndex = 0; autorHtml = autorHtml.replace(autorRx, '<mark>$1</mark>'); }

    const tags = [
      row.tp ? `<span class="tag tag-tema">${escapeHtml(row.tp)}</span>` : '',
      row.tm ? `<span class="tag tag-tom">${escapeHtml(row.tm)}</span>` : '',
      row.s  ? `<span class="tag tag-sent">${escapeHtml(row.s)}</span>` : '',
      row.d  ? `<span class="tag tag-dom">${escapeHtml(row.d)}</span>` : '',
    ].filter(Boolean).join('');

    card.innerHTML = `
      <div class="card-frase">${fraseHtml}</div>
      <div class="card-autor">— ${autorHtml}</div>
      ${tags ? '<div class="card-tags">' + tags + '</div>' : ''}
    `;
    container.appendChild(card);
  });

  renderPagination(totalPages);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination(totalPages) {
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  if (totalPages <= 1) return;

  const mkBtn = (label, page, active, disabled) => {
    const btn = document.createElement('button');
    btn.className = 'pag-btn' + (active ? ' active' : '');
    btn.textContent = label;
    btn.disabled = disabled;
    if (!disabled) btn.addEventListener('click', () => { currentPage = page; renderPage(); });
    return btn;
  };

  pag.appendChild(mkBtn('‹', currentPage - 1, false, currentPage === 1));

  // Smart pagination: show window around current page
  let pages = new Set([1, totalPages]);
  for (let p = Math.max(1, currentPage - 2); p <= Math.min(totalPages, currentPage + 2); p++) pages.add(p);
  let prev = 0;
  [...pages].sort((a,b)=>a-b).forEach(p => {
    if (prev && p - prev > 1) {
      const dots = document.createElement('span');
      dots.textContent = '…'; dots.style.cssText = 'color:var(--text3);padding:0 .3rem;';
      pag.appendChild(dots);
    }
    pag.appendChild(mkBtn(p, p, p === currentPage, false));
    prev = p;
  });

  pag.appendChild(mkBtn('›', currentPage + 1, false, currentPage === totalPages));
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── EVENTS ──
function setupEvents() {
  let debounceTimer;
  const debounce = (fn, delay=300) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(fn, delay);
  };

  document.getElementById('search-text').addEventListener('input', () => debounce(applyFilters));
  document.getElementById('search-autor').addEventListener('input', () => debounce(applyFilters));
  document.getElementById('filter-tom').addEventListener('change', applyFilters);
  document.getElementById('filter-sentimento').addEventListener('change', applyFilters);

  // Tema dropdown
  const temaDisplay = document.getElementById('tema-display');
  const temaDropdown = document.getElementById('tema-dropdown');
  const temaFilterInput = document.getElementById('tema-filter-input');

  temaDisplay.addEventListener('click', (e) => {
    e.stopPropagation();
    temaDropdown.classList.toggle('open');
    if (temaDropdown.classList.contains('open')) {
      temaFilterInput.value = '';
      updateTemaOptions('');
      temaFilterInput.focus();
    }
  });
  temaFilterInput.addEventListener('input', () => updateTemaOptions(temaFilterInput.value));
  temaFilterInput.addEventListener('keydown', e => e.stopPropagation());

  document.getElementById('tema-options-list').addEventListener('click', (e) => {
    const opt = e.target.closest('.tema-option');
    if (!opt) return;
    selectedTema = opt.dataset.value;
    temaDisplay.value = selectedTema || '';
    temaDisplay.placeholder = selectedTema ? selectedTema : 'Todos os temas';
    temaDropdown.classList.remove('open');
    // Mark selected
    document.querySelectorAll('#tema-options-list .tema-option').forEach(o => o.classList.remove('selected'));
    if (selectedTema) opt.classList.add('selected');
    applyFilters();
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.tema-wrap')) temaDropdown.classList.remove('open');
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    document.getElementById('search-text').value = '';
    document.getElementById('search-autor').value = '';
    document.getElementById('filter-tom').value = '';
    document.getElementById('filter-sentimento').value = '';
    selectedTema = '';
    temaDisplay.value = '';
    temaDisplay.placeholder = 'Todos os temas';
    document.querySelectorAll('#tema-options-list .tema-option').forEach(o => o.classList.remove('selected'));
    filtered = allData;
    currentPage = 1;
    renderPage();
  });
}

loadData();
</script>
</body>
</html>
